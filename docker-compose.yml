version: '3.8'

services:
  aggregation-service:
    build: ./aggregation-service
    ports:
      - "8080:8080"
    environment:
      - CATALOG_CLIENT_BASE_URL=http://catalog-mock-service:8080
      - CLIENTS_PRICING_BASE_URL=http://price-mock-service:8080
      - CLIENTS_AVAILABILITY_BASE_URL=http://availability-mock-service:8080
      - CLIENTS_CUSTOMER_BASE_URL=http://customer-mock-service:8080
    depends_on:
      - catalog-mock-service
      - price-mock-service
      - availability-mock-service
      - customer-mock-service
    networks:
      - app-network

  catalog-mock-service:
    build: ./catalog-mock-service
    ports:
      - "8081:8080"
    networks:
      - app-network

  price-mock-service:
    build: ./price-mock-service
    ports:
      - "8082:8080"
    networks:
      - app-network

  availability-mock-service:
    build: ./availability-mock-service
    ports:
      - "8083:8080"
    networks:
      - app-network  
  
  customer-mock-service:
    build: ./customer-mock-service
    ports:
      - "8084:8080"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge