version: '3.8'

services:
  aggregation-service:
    build: ./aggregation-service
    ports:
      - "8080:8080"
    environment:
      - CATALOG_CLIENT_BASE_URL=http://catalog-mock-service:8080
    depends_on:
      - catalog-mock-service
    networks:
      - app-network

  catalog-mock-service:
    build: ./catalog-mock-service
    ports:
      - "8081:8080"
    networks:
      - app-network

  price-mock-service:
    build: ./price-mock-service
    ports:
      - "8082:8080"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge