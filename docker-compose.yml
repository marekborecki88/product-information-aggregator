services:
  mock-service-1:
    build: ./mock-service
    ports:
      - "8081:8080"
    command: 
      - "-path"
      - "${SERVICE_PATH_1:-/api/v1}"
      - "-delay"
      - "${DELAY_1:-500}"
      - "-body"
      - "${BODY_1:-{\"status\": \"fast\"}"

  mock-service-2:
    build: ./mock-service
    ports:
      - "8082:8080"
    command:
      - "-path"
      - "${SERVICE_PATH_2:-/api/v2}"
      - "-delay"
      - "${DELAY_2:-3000}"
      - "-body"
      - "${BODY_2:-{\"status\": \"slow\"}"